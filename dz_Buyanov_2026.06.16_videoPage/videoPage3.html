<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Поиск фильмов</title>
    <link rel="stylesheet" href="videoPage3.css">
</head>
<body>
    <h1>🎬 Поиск фильмов</h1>
    
    <div class="search-box">
        <input type="text" id="inputTitle" placeholder="Введите название фильма, сериала или эпизода...">
        <select id="inputType">
            <option value="movie">🎬 Фильмы</option>
            <option value="series">📺 Сериалы</option>
            <option value="episode">📺 Эпизоды</option>
        </select>
        <button id="searchButton">🔍 Search</button>
    </div>

    <div id="listMovie"></div>
    <div id="footPage"></div>

    <div id="overlay" onclick="if(event.target===this) closeOverlay()">
        <div id="modalContent">
            <button class="close-btn" onclick="closeOverlay()">✕</button>
            <div id="modalBody">⏳ Загрузка...</div>
        </div>
    </div>

    <script src="videoPage3.js"></script>
</body>
</html>
